<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <style>
      .bg { fill: #f4f1ea; }
      .frame { fill: #fffdf8; stroke: #dbe3dc; stroke-width: 2; }
      .side { fill: #faf8ef; stroke: #e2e7df; stroke-width: 2; }
      .green { fill: #2f6b55; }
      .green-soft { fill: #e8f4ee; }
      .blue-soft { fill: #eaf1f8; }
      .yellow-soft { fill: #fff7d8; }
      .orange-soft { fill: #fff0df; }
      .purple-soft { fill: #f2eefb; }
      .ink { fill: #20302a; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .muted { fill: #708078; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .label { fill: #8c9b93; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
      .title { font-size: 54px; font-weight: 900; }
      .h2 { font-size: 30px; font-weight: 900; }
      .body { font-size: 21px; line-height: 1.6; }
      .small { font-size: 17px; }
      .buttonText { fill: #ffffff; font-size: 22px; font-weight: 900; }
      .chipText { font-size: 17px; font-weight: 800; }
      .arrow { stroke: #7f9188; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#7f9188"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f4138" flood-opacity=".13"/>
    </filter>
  </defs>

  <rect class="bg" width="1800" height="1180"/>

  <rect x="60" y="52" width="1680" height="170" rx="28" class="frame" filter="url(#shadow)"/>
  <text x="92" y="96" class="muted label">PRODUCT THESIS</text>
  <text x="92" y="155" class="ink title">Inner Notes：本地保存、可以批注和自动回顾的私人日记本</text>
  <text x="94" y="196" class="muted small">不是后台系统，不是 AI 咨询窗口。用户先安静写下真实内容，再用文档式批注整理想法；周期结束后由 Codex 读本地文件生成回顾。</text>

  <rect x="60" y="260" width="1680" height="520" rx="28" class="frame" filter="url(#shadow)"/>
  <text x="92" y="304" class="muted label">DESKTOP UI ANATOMY</text>

  <rect x="100" y="335" width="250" height="395" rx="20" class="side"/>
  <rect x="120" y="360" width="38" height="38" rx="10" fill="#597c93"/>
  <text x="168" y="386" class="ink small" font-weight="900">Inner Notes</text>
  <rect x="120" y="420" width="205" height="48" rx="12" class="green"/>
  <text x="180" y="451" class="buttonText">写今天这一页</text>
  <text x="120" y="508" class="muted small" font-weight="900">全部记录</text>
  <rect x="120" y="530" width="205" height="96" rx="16" class="green-soft"/>
  <text x="136" y="560" class="ink small" font-weight="900">7 月 2 日 周四</text>
  <text x="270" y="560" class="muted small" font-weight="900">01:31</text>
  <text x="136" y="590" class="muted small">好久没有写日记了</text>
  <rect x="136" y="604" width="74" height="24" rx="12" class="blue-soft"/>
  <text x="148" y="622" class="muted" font-size="14" font-weight="800">○ #焦虑</text>
  <text x="120" y="666" class="muted small" font-weight="900">自动回顾</text>
  <rect x="120" y="684" width="205" height="36" rx="12" class="blue-soft"/>
  <text x="134" y="708" class="ink" font-size="16" font-weight="800">上周回顾 · 6.22-6.28</text>

  <rect x="350" y="335" width="1050" height="395" rx="0" fill="#fffefa" stroke="#e2e7df" stroke-width="2"/>
  <text x="440" y="382" class="muted small" font-weight="800">7 月 2 日 周四 · 夜里 01:31</text>
  <text x="440" y="440" class="ink" font-size="42" font-weight="900">今天想记下什么？</text>
  <text x="440" y="502" class="ink" font-size="24">这里是主要正文。像一页纸，而不是一个表单。</text>
  <text x="440" y="548" class="ink" font-size="24">选中文字可以加粗、高亮、改颜色、评论。</text>
  <rect x="390" y="500" width="42" height="42" rx="12" fill="#ffffff" stroke="#d9e1db"/>
  <text x="404" y="529" fill="#245ed8" font-size="25" font-weight="900" font-family="Arial">T</text>
  <rect x="390" y="552" width="42" height="42" rx="12" fill="#ffffff" stroke="#d9e1db"/>
  <text x="402" y="583" class="ink" font-size="30">+</text>
  <rect x="655" y="550" width="390" height="52" rx="14" fill="#ffffff" stroke="#dbe3dc"/>
  <text x="675" y="583" class="ink" font-size="20" font-weight="900">B</text>
  <text x="722" y="583" class="ink" font-size="20" font-style="italic">I</text>
  <rect x="760" y="562" width="28" height="28" rx="6" fill="#fff5a3"/>
  <text x="766" y="583" class="ink" font-size="20" font-weight="900">A</text>
  <circle cx="830" cy="576" r="11" fill="#dd4b4b"/>
  <circle cx="870" cy="576" r="11" fill="#e88722"/>
  <circle cx="910" cy="576" r="11" fill="#2f9b63"/>
  <text x="956" y="583" class="ink" font-size="20" font-weight="900">评论</text>
  <text x="440" y="650" class="ink h2">今天的标记 ✦</text>
  <rect x="440" y="672" width="140" height="34" rx="17" class="green-soft"/>
  <text x="466" y="695" class="ink chipText">✦ #平静</text>
  <rect x="596" y="672" width="140" height="34" rx="17" class="blue-soft"/>
  <text x="622" y="695" class="ink chipText">◇ #迷茫</text>
  <rect x="752" y="672" width="140" height="34" rx="17" class="orange-soft"/>
  <text x="778" y="695" class="ink chipText">⋯ #不安</text>

  <rect x="1400" y="335" width="300" height="395" rx="20" class="side"/>
  <text x="1430" y="378" class="ink h2">评论</text>
  <text x="1650" y="378" class="muted small" font-weight="900">0 条</text>
  <text x="1430" y="420" class="muted small">选中正文，留下批注。</text>
  <line x1="1430" y1="456" x2="1670" y2="456" stroke="#e4e5dd" stroke-width="2"/>
  <text x="1430" y="500" class="ink h2">随便聊几句</text>
  <text x="1430" y="542" class="muted small">旧日记里的想法，写这里。</text>
  <rect x="1430" y="570" width="240" height="90" rx="12" fill="#fffdf8" stroke="#e0e4dd"/>

  <rect x="60" y="820" width="520" height="300" rx="28" class="frame" filter="url(#shadow)"/>
  <text x="92" y="864" class="muted label">USER FLOW</text>
  <text x="92" y="912" class="ink h2">从写作到回看</text>
  <text x="92" y="954" class="muted small">1. 写今天这一页 → 2. 文档式编辑 → 3. 批注 → 4. 轻量标记 → 5. 本地保存 → 6. 周期回顾</text>
  <path d="M118 1000 H520" class="arrow"/>
  <circle cx="120" cy="1000" r="18" class="green"/><text x="114" y="1007" class="buttonText" font-size="18">1</text>
  <circle cx="200" cy="1000" r="18" fill="#8aa6bd"/><text x="194" y="1007" class="buttonText" font-size="18">2</text>
  <circle cx="280" cy="1000" r="18" fill="#d49a35"/><text x="274" y="1007" class="buttonText" font-size="18">3</text>
  <circle cx="360" cy="1000" r="18" fill="#8e81b9"/><text x="354" y="1007" class="buttonText" font-size="18">4</text>
  <circle cx="440" cy="1000" r="18" fill="#2f6b55"/><text x="434" y="1007" class="buttonText" font-size="18">5</text>

  <rect x="620" y="820" width="520" height="300" rx="28" class="frame" filter="url(#shadow)"/>
  <text x="652" y="864" class="muted label">LOCAL-FIRST DATA</text>
  <text x="652" y="912" class="ink h2">真实文件，而不是临时状态</text>
  <rect x="652" y="940" width="140" height="95" rx="18" class="green-soft"/>
  <text x="682" y="978" class="ink small" font-weight="900">Markdown</text>
  <text x="676" y="1008" class="muted" font-size="15">用户正文</text>
  <rect x="820" y="940" width="140" height="95" rx="18" class="blue-soft"/>
  <text x="862" y="978" class="ink small" font-weight="900">JSON</text>
  <text x="846" y="1008" class="muted" font-size="15">结构数据</text>
  <rect x="988" y="940" width="120" height="95" rx="18" class="yellow-soft"/>
  <text x="1018" y="978" class="ink small" font-weight="900">Assets</text>
  <text x="1018" y="1008" class="muted" font-size="15">图片</text>
  <text x="652" y="1080" class="muted small">/Users/zz/Desktop/InnerNotes/journals</text>

  <rect x="1180" y="820" width="560" height="300" rx="28" class="frame" filter="url(#shadow)"/>
  <text x="1212" y="864" class="muted label">CODEX REVIEW AUTOMATION</text>
  <text x="1212" y="912" class="ink h2">自动回顾只处理完整周期</text>
  <rect x="1212" y="946" width="92" height="66" rx="16" class="blue-soft"/>
  <text x="1232" y="985" class="ink small" font-weight="900">定时</text>
  <path d="M1310 978 H1362" class="arrow"/>
  <rect x="1370" y="946" width="92" height="66" rx="16" class="yellow-soft"/>
  <text x="1390" y="985" class="ink small" font-weight="900">读取</text>
  <path d="M1468 978 H1520" class="arrow"/>
  <rect x="1528" y="946" width="92" height="66" rx="16" class="purple-soft"/>
  <text x="1548" y="985" class="ink small" font-weight="900">解读</text>
  <path d="M1626 978 H1660" class="arrow"/>
  <rect x="1660" y="946" width="58" height="66" rx="16" class="green-soft"/>
  <text x="1672" y="985" class="ink small" font-weight="900">写回</text>
  <text x="1212" y="1080" class="muted small">输出到 /reviews/weekly 和 /reviews/monthly</text>
</svg>

