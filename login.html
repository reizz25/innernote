<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inner Notes 登录</title>
  <style>
    :root {
      color: #282520;
      background: #f7f2ea;
      font-family: ui-serif, "Songti SC", "Noto Serif CJK SC", serif;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(420px, 100%);
      display: grid;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 650;
      letter-spacing: 0;
    }
    form {
      display: grid;
      gap: 12px;
      padding: 20px;
      border: 1px solid #d8cfc2;
      background: #fffaf3;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(70, 54, 33, 0.12);
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: #695f52;
    }
    input {
      min-height: 42px;
      border: 1px solid #cfc4b5;
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
      background: #fff;
      color: #282520;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    button {
      min-height: 40px;
      border: 1px solid #2f6f62;
      border-radius: 6px;
      padding: 0 16px;
      font: inherit;
      background: #2f6f62;
      color: #fff;
      cursor: pointer;
    }
    button.secondary {
      background: transparent;
      color: #2f6f62;
    }
    p {
      min-height: 20px;
      margin: 0;
      color: #8a3f35;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Inner Notes</h1>
    <form data-auth-form>
      <label>
        用户名
        <input name="username" autocomplete="username" required>
      </label>
      <label>
        密码
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <div class="actions">
        <button type="submit" data-mode="login">登录</button>
        <button type="button" class="secondary" data-mode="register">注册</button>
      </div>
      <p data-message></p>
    </form>
  </main>
  <script>
    const form = document.querySelector('[data-auth-form]');
    const message = document.querySelector('[data-message]');
    async function submit(mode) {
      message.textContent = '';
      const data = Object.fromEntries(new FormData(form).entries());
      const response = await fetch(`/api/${mode}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        message.textContent = payload.error || '登录失败';
        return;
      }
      window.location.href = '/';
    }
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      submit('login');
    });
    document.querySelector('[data-mode="register"]').addEventListener('click', () => submit('register'));
  </script>
</body>
</html>
